name: SBOM/SCA Scout

on:
  workflow_dispatch:
    inputs:
        docker_image:
          description: 'The Docker image to scan'
          required: true
          # Χρησιμοποιούμε το nginx:latest ως προεπιλεγμένο, δοκιμαστικό image
          default: 'nginx:latest' 

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker Image
        run: docker pull ${{ github.event.inputs.docker_image }}

      - name: Run Docker Scout to generate SARIF
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ github.event.inputs.docker_image }}
          sarif-file: sca_scout.sarif

      - name: Trim SARIF related locations to limit (1000 max)
        run: |
          # Διορθώνει το σφάλμα "rejecting SARIF, as there are more related locations per result than allowed"
          jq '.runs[].results[]?.relatedLocations |= if . != null and length > 1000 then .[0:1000] else . end' sca_scout.sarif > sca_scout_fixed.sarif
          mv sca_scout_fixed.sarif sca_scout.sarif

      - name: Upload SARIF result
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sca_scout.sarif
